<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Primary Meta -->
    <title>Mgobal — Kenya's Premier Online Store</title>
    <meta name="description" content="Shop millions of products across electronics, fashion, home, beauty and more. Fast delivery across all 47 counties with convenient pickup stations near you." />
    <meta name="keywords" content="online shopping kenya, buy electronics nairobi, mgobal, jumia alternative, konga kenya, fashion kenya, home appliances kenya" />
    <meta name="author" content="Mgobal" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mgobal.co.ke/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mgobal.co.ke/" />
    <meta property="og:title" content="Mgobal — Kenya's Premier Online Store" />
    <meta property="og:description" content="Shop millions of products with fast delivery to all 47 counties." />
    <meta property="og:image" content="https://mgobal.co.ke/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mgobal — Kenya's Premier Online Store" />
    <meta name="twitter:description" content="Shop millions of products with fast delivery across Kenya." />
    <meta name="twitter:image" content="https://mgobal.co.ke/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Mgobal",
      "url": "https://mgobal.co.ke",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://mgobal.co.ke/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
